# Local production build — same stack as docker-compose.prod.yml but images are
# built from local Dockerfiles instead of pulled from GHCR.
#
# Usage:
#   docker compose -f docker-compose.local-prod.yml --env-file .env up --build
#
# Set in .env (or export) before running:
#   DOMAIN=localhost              — Caddy serves plain HTTP for localhost (no TLS)
#   API_INTERNAL_URL=http://api:3001  — web→api goes via Docker network, not localhost
#   NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=pk_test_...  — inlined at Next.js build time

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    env_file: .env
    environment:
      PORT: ${WEB_PORT}
      # Override: in Docker the web container reaches api by service name.
      API_INTERNAL_URL: http://api:${API_PORT}
    expose:
      - "${WEB_PORT}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env
    expose:
      - "${API_PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    env_file: .env
    expose:
      - "${WORKER_PORT}"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WORKER_PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  caddy_data:
  caddy_config:
