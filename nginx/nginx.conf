# Reverse proxy for the flash-sale platform.
#
# Public surface:
#   /socket.io/  → api  (WebSocket — browser real-time connection)
#   /webhooks/   → api  (HTTP — payment provider callbacks)
#   /            → web  (Next.js — SSR + BFF API routes)
#
# Ports must match WEB_PORT and API_PORT in .env (default 3000 / 3001).
# web and api are NOT published to the host — reachable only via nginx.

events {
  worker_connections 1024;
}

http {
  upstream web {
    server web:3000;
  }

  upstream api {
    server api:3001;
  }

  server {
    listen 80;

    # WebSocket — browser connects to Socket.IO via its own origin; nginx upgrades the connection.
    location /socket.io/ {
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade    $http_upgrade;
      proxy_set_header   Connection "upgrade";
      proxy_set_header   Host       $host;
      proxy_read_timeout 3600s;
    }

    # Webhooks — payment provider POSTs here; routed straight to api.
    location /webhooks/ {
      proxy_pass         http://api;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Everything else → Next.js (SSR pages + /api/* BFF routes).
    location / {
      proxy_pass         http://web;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
    }
  }
}
