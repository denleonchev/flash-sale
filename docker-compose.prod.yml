# Production app stack (S-E0.3).
#
# Images are built by GitHub Actions and published to GHCR.
# Deploy is triggered by CI via IAP tunnel: pull + docker compose up -d.
#
# Runs caddy / web / api / worker in containers on a single host. The databases are NOT
# here — they are external managed services (Supabase Postgres + Upstash Redis),
# reached via DATABASE_URL / REDIS_URL in .env (technical-design §8).
#
# All config (incl. the external DB URLs) comes from .env. No secrets in this file.
#
# Traffic routing (caddy is the only service published to the host):
#   /socket.io/  → api  (WebSocket)
#   /webhooks/   → api  (payment callbacks)
#   /            → web  (Next.js SSR + BFF)
#   web/api are reachable only through caddy — not published to the host.
#
# HTTPS: Caddy provisions a Let's Encrypt cert automatically on first start.
# Requirement: the domain in Caddyfile must resolve to this server's IP before deploy.

services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # persists certs across restarts
      - caddy_config:/config
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/denleonchev/flash-sale-web:latest
    env_file: .env
    # Next standalone server listens on $PORT; reachable only through caddy.
    environment:
      PORT: ${WEB_PORT}
    expose:
      - "${WEB_PORT}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    image: ghcr.io/denleonchev/flash-sale-api:latest
    env_file: .env
    # api listens on $API_PORT; reachable only through caddy.
    expose:
      - "${API_PORT}"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    image: ghcr.io/denleonchev/flash-sale-worker:latest
    env_file: .env
    # Health-only HTTP on $WORKER_PORT — internal to the compose network, not published.
    expose:
      - "${WORKER_PORT}"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WORKER_PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  caddy_data:
  caddy_config:
