# Production app stack (S-E0.3).
#
# Images are built by GitHub Actions and published to GHCR.
# Deploy is triggered by CI via IAP tunnel: pull + docker compose up -d.
#
# Runs nginx / web / api / worker in containers on a single host. The databases are NOT
# here — they are external managed services (Supabase Postgres + Upstash Redis),
# reached via DATABASE_URL / REDIS_URL in .env (technical-design §8).
#
# All config (incl. the external DB URLs) comes from .env. No secrets in this file.
#
# Traffic routing (nginx is the only service published to the host):
#   /socket.io/  → api  (WebSocket)
#   /webhooks/   → api  (payment callbacks)
#   /            → web  (Next.js SSR + BFF)
#   web/api are reachable only through nginx — not published to the host.

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/denleonchev/flash-sale-web:latest
    env_file: .env
    # Next standalone server listens on $PORT; reachable only through nginx.
    environment:
      PORT: ${WEB_PORT}
    expose:
      - "${WEB_PORT}"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WEB_PORT}/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  api:
    image: ghcr.io/denleonchev/flash-sale-api:latest
    env_file: .env
    # api listens on $API_PORT; reachable only through nginx.
    expose:
      - "${API_PORT}"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${API_PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  worker:
    image: ghcr.io/denleonchev/flash-sale-worker:latest
    env_file: .env
    # Health-only HTTP on $WORKER_PORT — internal to the compose network, not published.
    expose:
      - "${WORKER_PORT}"
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://127.0.0.1:$${WORKER_PORT}/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
